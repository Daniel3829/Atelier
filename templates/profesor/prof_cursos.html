<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Courses | The Academic Atelier</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface": "#f7f9fb",
              "error": "#ba1a1a",
              "tertiary-container": "#4f2e00",
              "on-tertiary-fixed": "#2b1700",
              "surface-bright": "#f7f9fb",
              "on-primary-fixed-variant": "#2d476f",
              "primary": "#002045",
              "surface-container-high": "#e6e8ea",
              "on-tertiary-fixed-variant": "#633f0f",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#2d3133",
              "secondary-fixed-dim": "#b7c8e1",
              "tertiary": "#321b00",
              "on-primary-container": "#86a0cd",
              "outline-variant": "#c4c6cf",
              "background": "#f7f9fb",
              "primary-fixed-dim": "#adc7f7",
              "surface-container": "#eceef0",
              "secondary-container": "#d0e1fb",
              "on-primary-fixed": "#001b3c",
              "on-surface-variant": "#43474e",
              "inverse-primary": "#adc7f7",
              "on-tertiary-container": "#c6955e",
              "inverse-on-surface": "#eff1f3",
              "surface-container-highest": "#e0e3e5",
              "secondary": "#505f76",
              "surface-dim": "#d8dadc",
              "on-surface": "#191c1e",
              "tertiary-fixed": "#ffddba",
              "tertiary-fixed-dim": "#f2bc82",
              "surface-container-lowest": "#ffffff",
              "on-secondary-container": "#54647a",
              "on-secondary-fixed-variant": "#38485d",
              "surface-tint": "#455f88",
              "error-container": "#ffdad6",
              "surface-variant": "#e0e3e5",
              "surface-container-low": "#f2f4f6",
              "on-primary": "#ffffff",
              "on-secondary": "#ffffff",
              "primary-container": "#1a365d",
              "outline": "#74777f",
              "secondary-fixed": "#d3e4fe",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#0b1c30",
              "on-error-container": "#93000a",
              "primary-fixed": "#d6e3ff",
              "on-background": "#191c1e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-secondary-container selection:text-on-secondary-container">
<!-- SideNavBar -->
<aside class="hidden md:flex flex-col h-screen w-64 fixed left-0 top-0 overflow-y-auto bg-[#eceef0] p-6 space-y-4 z-50">
    <div class="mb-8 px-2">
        <h1 class="text-lg font-extrabold text-[#1A365D] font-headline tracking-tight">Academic Atelier</h1>
        <p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold opacity-60">Módulo de Gestión</p>
    </div>
    <nav class="flex-1 space-y-2">
        <a class="flex items-center gap-3 px-4 py-3 bg-white text-[#1A365D] shadow-sm font-semibold rounded-lg transition-all duration-200 group" href="/dashboard/profesor/cursos/">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;" data-icon="menu_book">menu_book</span>
            <span class="font-medium text-sm">Cursos</span>
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-[#191c1e] opacity-80 hover:opacity-100 hover:bg-[#e6e8ea] rounded-lg transition-all duration-200 group" href="/dashboard/profesor/notas/">
            <span class="material-symbols-outlined" data-icon="grade">grade</span>
            <span class="font-medium text-sm group-hover:translate-x-1 transition-transform">Calificaciones</span>
        </a>
    </nav>
    <div class="mt-auto">
        <button onclick="Auth.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-error/10 hover:bg-error text-error hover:text-white rounded-lg transition-all font-semibold font-['Inter'] text-sm shadow-sm md:justify-start">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">logout</span>
            <span>Cerrar Sesión</span>
        </button>
    </div>
</aside>
<!-- Main Content Area -->
<main class="md:ml-64 min-h-screen">
<!-- TopAppBar -->
<header class="sticky top-0 w-full flex justify-between items-center px-8 py-4 bg-white/80 dark:bg-[#191c1e]/80 backdrop-blur-md z-40 shadow-[0px_12px_32px_rgba(0,32,69,0.06)]">
    <div class="flex items-center gap-6">
        <span class="text-xl font-bold text-[#191c1e] dark:text-[#f7f9fb] font-['Manrope'] tracking-tight">Plataforma Académica</span>
    </div>
    <div class="flex items-center gap-4">
        <div class="flex items-center gap-2 group cursor-pointer">
            <div class="text-right">
                <p id="nav-user-name" class="text-sm font-bold text-on-surface">Cargando...</p>
                <p id="nav-user-role" class="text-[10px] text-on-surface-variant font-medium uppercase tracking-wider">Cargando...</p>
            </div>
            <div id="nav-user-initial" class="w-10 h-10 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-bold">U</div>
        </div>
    </div>
</header>
<!-- Editorial Content Layout -->
<div class="max-w-[1400px] mx-auto p-8 lg:p-12">
<!-- Page Header -->
<div class="mb-12">
<h2 class="text-4xl lg:text-5xl font-extrabold text-primary tracking-tight mb-2">Mis Cursos</h2>
<p id="prof-subtitle" class="text-on-surface-variant max-w-xl font-body">Cargando información del profesor...</p>
</div>
<!-- Bento Grid Courses -->
<div id="courses-container" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
    <div class="lg:col-span-12 p-8 text-center text-on-surface-variant">Loading courses...</div>
</div>
</div>
</main>
<!-- FAB Suppression Applied: No FAB on Details/Management Screen -->
<script src="/static/js/api.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireAuth()) return;
    wireLogout();

    const currentUser = Auth.getUser();
    if (currentUser.rol !== 'PROFESOR') {
        Auth.redirectByRole(currentUser.rol);
        return;
    }

    document.getElementById('nav-user-name').textContent = `${currentUser.first_name} ${currentUser.last_name || ''}`;
    document.getElementById('nav-user-role').textContent = currentUser.rol;
    document.getElementById('nav-user-initial').textContent = currentUser.first_name ? currentUser.first_name[0].toUpperCase() : 'U';

    try {
        const courses = await apiGet('/cursos/');
        const container = document.getElementById('courses-container');
        document.getElementById('prof-subtitle').textContent = `Administrando su ciclo académico. Supervisando ${courses ? courses.length : 0} módulos activos.`;
        
        if (!courses || courses.length === 0) {
            container.innerHTML = '<div class="lg:col-span-12 p-8 text-center text-on-surface-variant">You have no assigned courses.</div>';
            return;
        }

        courses.forEach((c) => {
            const defaultImg = "https://lh3.googleusercontent.com/aida-public/AB6AXuBiUKwJNdLGF-e3HoyVMzKZ4IInjoNog2i77guD1ox9k0RUzmOwe6HShwP64YvAMLYtOuOEbAGv7Ba2ko0VTrPsgQ2qoOKTadE00W9cmUjUTSdMuwCggqiQ9BLbSLQpnjkpPfDSDL5eVCP4wSwhwkWSDwui1m6Llfox3Di5yvxywmsU4-3-ivISKX9dA18nELWM0t8nNYBtLxz4jygkIRlqfv31o7StkXcjuJWsrqVCDHhLmfcK0_yY92bNYZFz-dXbJbACGdw6bKLn";
            const imageUrl = c.imagen || defaultImg;
            
            container.innerHTML += `
            <div class="lg:col-span-6 group relative overflow-hidden rounded-2xl bg-surface-container-lowest shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all duration-300 border border-outline-variant/20 min-h-[320px] flex flex-col">
                <!-- Imagen de Fondo -->
                <img src="${imageUrl}" class="absolute inset-0 w-full h-full object-cover opacity-10 group-hover:opacity-25 transition-opacity duration-500 group-hover:scale-105" />
                <div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest via-surface-container-lowest/90 to-surface-container-lowest/30"></div>
                
                <div class="relative flex flex-col h-full z-10 p-8">
                    <!-- Header Tarjeta -->
                    <div class="flex justify-between items-start mb-auto">
                        <div class="flex flex-col gap-2">
                            <span class="inline-flex items-center justify-center px-4 py-1.5 rounded-full bg-primary-container text-on-primary-container text-xs font-bold uppercase tracking-widest shadow-sm ring-1 ring-primary/20">
                                Código: ${c.codigo}
                            </span>
                            <span class="inline-flex items-center justify-center px-4 py-1.5 rounded-full bg-secondary-container text-on-secondary-container text-[10px] font-bold uppercase tracking-widest shadow-sm ring-1 ring-secondary/20">
                                Duración: ${c.duracion} Meses
                            </span>
                        </div>
                        <div class="w-10 h-10 rounded-full bg-white/50 backdrop-blur-sm flex items-center justify-center shadow-sm text-primary">
                            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_stories</span>
                        </div>
                    </div>
                    
                    <!-- Cuerpo Tarjeta -->
                    <div class="mt-8 mb-6 text-center">
                        <h3 class="text-3xl font-bold text-primary leading-tight mb-2 tracking-tight drop-shadow-sm">${c.nombre}</h3>
                        <p class="text-sm text-secondary font-medium">Gestión integral de calificaciones y rendimiento.</p>
                    </div>
                    
                    <!-- Footer / Botón -->
                    <div class="w-full mt-auto pt-4 flex justify-center border-t border-outline-variant/10">
                        <a href="/dashboard/profesor/notas/?curso=${c.id}" class="w-full max-w-sm flex items-center justify-center gap-2 py-3 px-6 bg-primary text-white rounded-xl font-bold text-sm hover:bg-primary/90 transition-colors shadow-md group-hover:shadow-lg">
                            <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;" data-icon="grade">grade</span>
                            Gestionar Notas
                        </a>
                    </div>
                </div>
            </div>
            `;
        });

    } catch (e) {
        console.error(e);
        document.getElementById('courses-container').innerHTML = '<div class="lg:col-span-12 p-8 text-center text-error">Error loading courses.</div>';
    }
});
</script>
</body></html>
